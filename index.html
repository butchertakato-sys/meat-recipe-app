<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>食肉加工 配合・製造管理</title>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --ink: #1f2937;
      --muted: #5f6b7a;
      --line: #e5e7eb;
      --brand: #14532d;
      --brand-dark: #123c24;
      --accent: #9f2f22;
      --soft: #f5f5f5;
      --warn: #fff7ed;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      --radius: 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-size: 19px;
      line-height: 1.55;
      writing-mode: horizontal-tb;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      width: 100%;
      min-height: 56px;
      border: 0;
      border-radius: var(--radius);
      cursor: pointer;
      touch-action: manipulation;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 56px;
      border: 2px solid var(--line);
      border-radius: 12px;
      padding: 14px 16px;
      background: #fff;
      color: var(--ink);
      font-size: 20px;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      align-items: center;
      width: min(700px, 100%);
      margin: 0 auto;
      padding: calc(16px + env(safe-area-inset-top)) 16px 14px;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
    }

    .topbar.has-back {
      grid-template-columns: 56px 1fr;
    }

    .back {
      display: none;
      background: var(--panel);
      border: 2px solid var(--line);
      color: var(--ink);
      font-size: 26px;
      font-weight: 800;
    }

    .topbar.has-back .back {
      display: block;
    }

    .title {
      min-width: 0;
      writing-mode: horizontal-tb;
    }

    .title h1 {
      margin: 0;
      font-size: clamp(22px, 4vw, 30px);
      line-height: 1.2;
      letter-spacing: 0;
      white-space: normal;
    }

    .title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    main {
      width: min(700px, 100%);
      margin: 0 auto;
      padding: 18px 16px calc(36px + env(safe-area-inset-bottom));
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .menu-grid {
      grid-template-columns: 1fr;
    }

    .home-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items: stretch;
    }

    .menu-button {
      display: flex;
      min-height: 88px;
      height: 100%;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 6px;
      padding: 18px 20px;
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--ink);
      text-align: left;
    }

    .menu-button strong {
      font-size: 23px;
      line-height: 1.25;
    }

    .menu-button span {
      color: var(--muted);
      font-size: 16px;
    }

    .primary {
      background: var(--brand);
      color: #fff;
      font-weight: 800;
    }

    .secondary {
      background: var(--panel);
      border: 2px solid var(--line);
      color: var(--ink);
      font-weight: 700;
    }

    .section {
      margin-bottom: 18px;
      padding: 18px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow-x: hidden;
    }

    .section h2,
    .section h3 {
      margin: 0 0 12px;
      line-height: 1.25;
    }

    .section h2 {
      font-size: 26px;
    }

    .section h3 {
      font-size: 22px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      align-items: end;
      margin-bottom: 12px;
    }

    .radio-group {
      display: grid;
      gap: 8px;
      padding: 10px 0;
    }

    .radio-option {
      min-height: 50px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      color: var(--ink);
      font-weight: 800;
    }

    .radio-option input {
      width: 24px;
      min-height: 24px;
      height: 24px;
      margin: 0;
      padding: 0;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-weight: 700;
    }

    .result-box {
      display: grid;
      gap: 10px;
      margin-top: 14px;
      padding: 16px;
      background: var(--soft);
      border-radius: var(--radius);
    }

    .meat-info-box {
      border: 2px solid #9bbcff;
      background: #f8fbff;
    }

    .result-subtitle {
      color: #1d4ed8;
      font-size: 18px;
      font-weight: 900;
    }

    .meat-info-box .result-row:last-child {
      margin-top: 2px;
      padding-top: 10px;
      border-top: 1px dashed #8aa3c7;
    }

    .result-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px 12px;
      align-items: baseline;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
    }

    .result-row:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }

    .result-name {
      min-width: 0;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .result-formula {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 14px;
    }

    .result-value {
      font-size: 25px;
      font-weight: 900;
      white-space: nowrap;
    }

    .product-name {
      margin: 2px 0 16px;
      padding: 14px 16px;
      background: var(--soft);
      border-radius: var(--radius);
      font-size: 24px;
      font-weight: 900;
    }

    .note {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 16px;
    }

    .tabbar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }

    .tab {
      min-height: 54px;
      background: #fff;
      border: 2px solid var(--line);
      color: var(--ink);
      font-weight: 800;
    }

    .tab.active {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }

    details {
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      overflow: hidden;
    }

    summary {
      min-height: 56px;
      display: flex;
      align-items: center;
      padding: 12px 14px;
      font-size: 21px;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
    }

    details .details-body {
      padding: 0 14px 14px;
    }

    .spec-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .spec-list li {
      padding: 12px;
      background: var(--soft);
      border-radius: var(--radius);
    }

    .copy-area {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .status {
      min-height: 28px;
      color: var(--brand-dark);
      font-weight: 800;
    }

    .status.notice {
      min-height: auto;
      padding: 10px 12px;
      background: #eaf4ff;
      border: 1px solid #b8d7ff;
      border-radius: 12px;
    }

    .status.error {
      min-height: auto;
      padding: 10px 12px;
      background: var(--warn);
      border: 1px solid #ffd0c2;
      border-radius: 12px;
    }

    .empty {
      padding: 20px;
      background: var(--warn);
      border-radius: var(--radius);
      font-weight: 700;
    }

    .record-summary {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 16px;
    }

    .record-actions {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    @media (max-width: 620px) {
      body {
        font-size: 18px;
      }

      main {
        padding-left: 10px;
        padding-right: 10px;
      }

      .section {
        padding: 16px;
      }

      .menu-button {
        min-height: 82px;
      }

      .home-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header id="topbar" class="topbar">
      <button id="backButton" class="back" type="button" aria-label="戻る">←</button>
      <div class="title">
        <h1 id="screenTitle">食肉加工 配合・製造管理</h1>
        <p id="screenSubtitle">単体HTML / iPad・iPhone・Windows共通</p>
      </div>
    </header>
    <main id="app"></main>
  </div>

  <script>
    /*
      開発用メモ: 肉重量1000g時の期待値
      あらびき: 水200g, 乳化生地240g(自動), 塩19.2g, ウインナーヘラマント7.2g, ヘラビンE3.6g, ペルビナールHH1.2g
      チーズ: 水200g, 乳化生地240g(自動), 塩19.2g, ウインナーヘラマント7.2g, ヘラビンE3.6g, ペルビナールHH1.2g, チーズ144g
      ハーブ: 水200g, 乳化生地240g(自動), 塩19.2g, ブラートブルストD7.2g, ヘラビンE3.6g, ペルビナールHH1.2g, マジョラム1.44g, バジル0.72g, オレガノ0.72g
      チョリソー: 水200g, 乳化生地240g(自動), 塩19.2g, ヘラビンE3.6g, ペルビナールHH1.2g, チョリソースパイス17.28g, 唐辛子2.88g
      山小屋: 背脂160g, 水232g, 塩22.272g, スパイス22.272g, ヘラビンE4.176g, ペルビナールHH1.392g
      ベーコン: 豚バラ肉1000g, 塩25g, 三温糖6.25g
      生ハム: 骨付きもも肉1000g, 塩100g
      乳化生地/豚肉のみ: 肉1000g, 豚脂333.3333333333g, 氷333.3333333333g, 塩26.6666666667g, ヘラビンE5g, ペルビナールHH1.6666666667g
      乳化生地/豚肉+豚脂: 豚肉+豚脂1000g, 氷250g, 塩20g, ヘラビンE3.75g, ペルビナールHH1.25g
    */

    const appState = {
      activeClientTab: "calc"
    };
    const MANUFACTURING_RECORDS_KEY = "manufacturingRecords";
    const SAVED_RECIPE_CALCULATIONS_KEY = "savedRecipes";
    const OLD_MANUFACTURING_RECORDS_KEY = "meatRecipeApp.manufacturingRecords.v1";
    const OLD_SAVED_RECIPE_CALCULATIONS_KEY = "meatRecipeApp.savedRecipeCalculations.v1";
    const MANUFACTURING_RECORD_CSV_HEADERS = ["仕込み日", "製造日", "製造区分", "レシピ名", "ロット番号", "6mm肉重量", "3mm肉重量", "肉重量合計", "水", "乳化生地重量", "合計重量", "包装単位", "包装数", "完成本数", "ロス本数", "余り重量", "完成重量", "歩留まり率", "メモ"];
    const SCREEN_STATE_KEY = "meatRecipeApp.screenState.v1";
    let currentScreenState = null;

    const ownRecipes = {
      arabiki: { name: "あらびき", description: "自社レシピ", kind: "own" },
      cheese: { name: "チーズ", description: "自社レシピ", kind: "own" },
      herb: { name: "ハーブ", description: "自社レシピ", kind: "own" },
      chorizo: { name: "チョリソー", description: "自社レシピ", kind: "own" }
    };

    const ownPackagingSpecs = {
      arabiki: { unit: "袋", countLabel: "包装数", unitWeightLabel: "1袋重量", unitPiecesLabel: "1袋本数", unitWeight: 130, unitPieces: 3 },
      cheese: { unit: "袋", countLabel: "包装数", unitWeightLabel: "1袋重量", unitPiecesLabel: "1袋本数", unitWeight: 130, unitPieces: 3 },
      chorizo: { unit: "袋", countLabel: "包装数", unitWeightLabel: "1袋重量", unitPiecesLabel: "1袋本数", unitWeight: 130, unitPieces: 3 },
      herbProduct: { unit: "袋", countLabel: "包装数", unitWeightLabel: "1袋重量", unitPiecesLabel: "1袋本数", unitWeight: 130, unitPieces: 3 },
      herbEvent: { unit: "本", countLabel: "完成本数", unitWeightLabel: "1本重量", unitPiecesLabel: "", unitWeight: 80, unitPieces: 1 }
    };

    const outsourceClients = {
      yamanoya: {
        name: "山小屋",
        description: "スパイスソーセージ",
        recipe: { name: "山小屋 スパイスソーセージ", kind: "yamanoya" },
        specs: ["商品名: スパイスソーセージ", "長さ: 17cm", "ケーシング: 羊腸22-24", "規格袋: 22-33", "1袋あたり: 7～8本"],
        spiceMix: [
          { name: "ホワイトペッパー", amount: 132 },
          { name: "コリアンダー", amount: 80 },
          { name: "クローブ", amount: 20 },
          { name: "クミン", amount: 20 },
          { name: "ナツメグ", amount: 6 },
          { name: "ガーリック", amount: 6 },
          { name: "シナモン", amount: 4 },
          { name: "ブドウ糖", amount: 66 }
        ]
      },
      gibier: {
        name: "ジビエセンター",
        description: "鹿ソーセージ",
        recipe: { name: "ジビエセンター 鹿ソーセージ", productName: "鹿ソーセージ", kind: "gibier" },
        specs: ["商品名: 鹿ソーセージ", "長さ: 15cm", "ケーシング: 羊腸24-26", "袋詰め: なし"],
        notes: ["鹿肉: ジビエセンターから支給", "豚ひき肉: エーコープで仕入"]
      },
      zanzatei: {
        name: "ざんざ亭",
        description: "鹿ソーセージ",
        suppliedDough: { productName: "鹿ソーセージ" },
        specs: [
          "生地支給: レシピなし",
          "挽き目: 生地全量を6mmで挽く",
          "ケーシング: 羊腸22-24（支給）",
          "長さ: 13.5cm",
          "規格袋: 15-25（支給）",
          "袋詰め: 1袋5本詰め"
        ]
      },
      touge: {
        name: "峠の茶屋",
        description: "あらびき・ハーブ",
        recipes: [
          { name: "あらびき", productName: "あらびき", baseRecipeName: "あらびき", kind: "touge", clientName: "峠の茶屋" },
          { name: "ハーブ", productName: "ハーブ", baseRecipeName: "ハーブ", kind: "touge", clientName: "峠の茶屋" }
        ],
        specs: ["ケーシング: 羊腸22-24", "長さ: 10cm", "規格袋: 12-17", "袋詰め: あらびき、ハーブを1本ずつの計2本で袋詰め"]
      }
    };

    const menuSections = [
      {
        title: "自社レシピ",
        items: Object.entries(ownRecipes).map(([id, recipe]) => ({ label: recipe.name, description: recipe.description, type: "recipe", id }))
      },
      {
        title: "委託製造",
        items: Object.entries(outsourceClients).map(([id, client]) => ({ label: client.name, description: client.description, type: "client", id }))
      },
      {
        title: "管理・計算",
        items: [
          { label: "ベーコン", description: "塩・三温糖・塩漬け予定", type: "curing", id: "bacon" },
          { label: "生ハム", description: "塩・熟成完了予定", type: "curing", id: "prosciutto" },
          { label: "乳化生地", description: "豚肉のみ / 豚肉＋豚脂", type: "emulsion", id: "emulsion" }
        ]
      }
    ];

    const app = document.getElementById("app");
    const topbar = document.getElementById("topbar");
    const backButton = document.getElementById("backButton");
    const screenTitle = document.getElementById("screenTitle");
    const screenSubtitle = document.getElementById("screenSubtitle");
    let currentBackHandler = showHome;

    backButton.addEventListener("click", () => currentBackHandler());

    function setHeader(title, subtitle, canGoBack, backHandler = showHome) {
      screenTitle.textContent = title;
      screenSubtitle.textContent = subtitle || "";
      topbar.classList.toggle("has-back", Boolean(canGoBack));
      currentBackHandler = canGoBack && typeof backHandler === "function" ? backHandler : showHome;
    }

    function todayString() {
      const date = new Date();
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function addDays(dateString, days) {
      const date = new Date(dateString + "T00:00:00");
      date.setDate(date.getDate() + Number(days));
      return date.toISOString().slice(0, 10);
    }

    function addMonths(dateString, months) {
      const date = new Date(dateString + "T00:00:00");
      date.setMonth(date.getMonth() + Number(months));
      return date.toISOString().slice(0, 10);
    }

    function formatNumber(value, digits = 1) {
      const numericValue = Number(value);
      return numericValue.toLocaleString("ja-JP", {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits
      });
    }

    function readStorageArray(primaryKey, legacyKey) {
      try {
        let rawValue = localStorage.getItem(primaryKey);
        if (rawValue == null && legacyKey) {
          rawValue = localStorage.getItem(legacyKey);
          if (rawValue != null) localStorage.setItem(primaryKey, rawValue);
        }
        const parsed = JSON.parse(rawValue || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    function amountFromRows(rows, name) {
      const row = Array.isArray(rows) ? rows.find((item) => item.name === name) : null;
      return row ? Number(row.calculated || 0) : 0;
    }

    function sumRows(rows) {
      return Array.isArray(rows) ? rows.reduce((sum, row) => sum + Number(row.calculated || 0), 0) : 0;
    }

    function enrichSavedRecipeCalculation(record) {
      const rows = Array.isArray(record.rows) ? record.rows : [];
      const meatTotal = Number(record.meatTotal || 0);
      const emulsionWeight = Number(record.emulsionWeight || 0);
      const recipeMaterialTotal = Number(record.total != null ? record.total : sumRows(rows));
      const waterAmount = Number(record.waterAmount != null ? record.waterAmount : amountFromRows(rows, "水"));
      const totalWeight = Number(record.totalWeight != null ? record.totalWeight : meatTotal + recipeMaterialTotal);
      const otherMaterialTotal = Number(record.otherMaterialTotal != null ? record.otherMaterialTotal : Math.max(recipeMaterialTotal - waterAmount - emulsionWeight, 0));
      const theoreticalFinishedWeight = Number(record.theoreticalFinishedWeight != null ? record.theoreticalFinishedWeight : totalWeight);
      const packagingSpec = record.packagingKey ? ownPackagingSpecs[record.packagingKey] : null;
      return {
        ...record,
        waterAmount,
        emulsionWeight,
        otherMaterialTotal,
        total: recipeMaterialTotal,
        totalWeight,
        theoreticalFinishedWeight,
        packagingUnit: record.packagingUnit || (packagingSpec ? packagingSpec.unit : ""),
        unitWeight: record.unitWeight != null ? record.unitWeight : (packagingSpec ? packagingSpec.unitWeight : null),
        unitPieces: record.unitPieces != null ? record.unitPieces : (packagingSpec ? packagingSpec.unitPieces : null),
        updatedAt: record.updatedAt || record.savedAt || record.createdAt || ""
      };
    }

    function yieldDisplayText(record) {
      return record.yieldRate == null ? "計算不可" : `${formatRecordNumber(record.yieldRate)}%`;
    }

    function supportedRestoreScreen(screen) {
      return ["recordTop", "recordForm", "savedRecipeList", "recordHistory"].includes(screen);
    }

    function saveScreenState(screen, hierarchy = [], form = {}) {
      const state = { screen, hierarchy, form, savedAt: new Date().toISOString() };
      currentScreenState = state;
      try {
        localStorage.setItem(SCREEN_STATE_KEY, JSON.stringify(state));
      } catch (error) {
        // State restore is helpful but must not block recipe or record work.
      }
    }

    function loadScreenState() {
      try {
        const parsed = JSON.parse(localStorage.getItem(SCREEN_STATE_KEY) || "null");
        return parsed && supportedRestoreScreen(parsed.screen) ? parsed : null;
      } catch (error) {
        return null;
      }
    }

    function clearScreenState() {
      currentScreenState = null;
      try {
        localStorage.removeItem(SCREEN_STATE_KEY);
      } catch (error) {
        // Ignore storage errors when clearing optional draft state.
      }
    }

    function recordFormDraftValues() {
      const ids = ["recordPrepDate", "recordDate", "recordCategory", "recordRecipe", "recordLot", "recordMemo", "recordPackageCount", "recordLossCount", "recordLeftoverWeight"];
      const values = {};
      ids.forEach((id) => {
        const element = document.getElementById(id);
        if (element) values[id] = element.value;
      });
      return values;
    }

    function persistCurrentScreenState() {
      if (!currentScreenState) return;
      if (currentScreenState.screen === "recordForm") {
        saveScreenState("recordForm", ["home", "records", "new"], recordFormDraftValues());
        return;
      }
      saveScreenState(currentScreenState.screen, currentScreenState.hierarchy || [], currentScreenState.form || {});
    }

    function showRestorePrompt(state) {
      setHeader("食肉加工 配合・製造管理", "前回の作業を復元できます", false);
      app.innerHTML = `
        <section class="section">
          <h2>前回の画面を復元しますか？</h2>
          <p class="note">別アプリへ切り替える前の画面と入力途中の内容を復元できます。</p>
          <div class="record-actions">
            <button id="restoreScreenState" class="primary" type="button">復元する</button>

    function loadSavedRecipeCalculations() {
      const parsed = readStorageArray(SAVED_RECIPE_CALCULATIONS_KEY, OLD_SAVED_RECIPE_CALCULATIONS_KEY);
      let changed = false;
      const normalized = parsed.map((record, index) => {
        let item = record;
        if (!item.savedRecipeId && !item.id) {
          changed = true;
          const savedRecipeId = `saved-recipe-${item.savedAt || item.createdAt || Date.now()}-${index}`;
          item = { ...item, id: savedRecipeId, savedRecipeId };
        }
        const enriched = enrichSavedRecipeCalculation(item);
        if (enriched.totalWeight !== item.totalWeight || enriched.waterAmount !== item.waterAmount || enriched.theoreticalFinishedWeight !== item.theoreticalFinishedWeight) changed = true;
        return enriched;
      });
      if (changed) {
        localStorage.setItem(SAVED_RECIPE_CALCULATIONS_KEY, JSON.stringify(normalized));
      }
      return normalized;
    }

    function saveRecipeCalculation(calculation) {
      if (!calculation) return;
      const records = loadSavedRecipeCalculations();
      const savedRecipeId = `${Date.now()}`;
      const enriched = enrichSavedRecipeCalculation({
        ...calculation,
        id: savedRecipeId,
        savedRecipeId,
        memo: calculation.memo || "",
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      });
      records.unshift(enriched);
      localStorage.setItem(SAVED_RECIPE_CALCULATIONS_KEY, JSON.stringify(records));
    }

    function saveSavedRecipeCalculations(records) {
      localStorage.setItem(SAVED_RECIPE_CALCULATIONS_KEY, JSON.stringify(records));
    }

    function savedRecipeRecordId(record) {
      return record.savedRecipeId || record.id;
    }

      ));
    }

    function generateManufacturingLot(dateString, category, recipe, packagingKey = "") {
      const datePart = (dateString || todayString()).replace(/-/g, "");
      const categoryCode = category === "自社レシピ" ? "JI" : "IT";
      const recipeCode = packagingKey === "herbProduct" ? "HERB-P" : packagingKey === "herbEvent" ? "HERB-E" : recipeCodeForRecipe(recipe);
      const base = `${datePart}-${categoryCode}-${recipeCode}`;
      const count = loadManufacturingRecords().filter((record) => String(record.lot || "").startsWith(base)).length + 1;
      return `${base}-${String(count).padStart(2, "0")}`;
    }

    function bindSavedRecipeEdit(record) {
      const prepDate = document.getElementById("savedRecipePrepDate");
      const meat6mm = document.getElementById("savedRecipeMeat6mm");
      const meat3mm = document.getElementById("savedRecipeMeat3mm");
      const memo = document.getElementById("savedRecipeMemo");
      const preview = document.getElementById("savedRecipePreview");
      const renderPreview = () => {
        const updated = recalculateSavedRecipe(record, Number(meat6mm.value || 0), Number(meat3mm.value || 0), prepDate.value, memo.value);
        preview.innerHTML = `${meatInfoHtml({ meat6mm: updated.meat6mm, meat3mm: updated.meat3mm, meatTotal: updated.meatTotal })}${tableHtml(updated.rows, updated.total)}`;
      };
      [prepDate, meat6mm, meat3mm, memo].forEach((element) => element.addEventListener("input", renderPreview));
      document.getElementById("savedRecipeCancel").addEventListener("click", () => showSavedRecipeDetail(savedRecipeRecordId(record)));
      document.getElementById("savedRecipeSave").addEventListener("click", () => {
        const updated = recalculateSavedRecipe(record, Number(meat6mm.value || 0), Number(meat3mm.value || 0), prepDate.value, memo.value);
        const records = loadSavedRecipeCalculations();
        const index = records.findIndex((item) => savedRecipeRecordId(item) === savedRecipeRecordId(record));
        if (index >= 0) records[index] = updated;
        try {
          saveSavedRecipeCalculations(records);
          showSavedRecipeDetail(savedRecipeRecordId(record), false, "保存しました");
        } catch (error) {
          document.getElementById("savedRecipeStatus").textContent = "保存に失敗しました";
        }
      });
      renderPreview();
    }

    function recalculateSavedRecipe(record, meat6mmValue, meat3mmValue, prepDate, memo) {
      const meat6mm = Math.max(Number(meat6mmValue || 0), 0);
      const meat3mm = Math.max(Number(meat3mmValue || 0), 0);
      const meatTotal = meat6mm + meat3mm;
      let rows = [];
      let emulsionWeight = 0;
      if (record.recipeKind === "yamanoya") {
        rows = calculateYamanoya(meatTotal);
      } else if (record.recipeKind === "gibier") {
        rows = calculateGibier(meat6mm, meat3mm);
      } else {
        const water = meatTotal * 0.2;
        emulsionWeight = (meatTotal + water) * 0.2;
        rows = calculateOwnRecipe(record.savedRecipeName || record.recipeName, meatTotal, emulsionWeight, "自動計算");
      }
      const total = rows.reduce((sum, row) => sum + row.calculated, 0);
      return enrichSavedRecipeCalculation({ ...record, prepDate, meat6mm, meat3mm, meatTotal, emulsionWeight, rows, total, memo, updatedAt: new Date().toISOString() });
    }

    function deleteSavedRecipe(savedRecipeId) {
      if (!confirm("この保存済みレシピを削除しますか？この操作は元に戻せません。")) return;
      const records = loadSavedRecipeCalculations().filter((record) => savedRecipeRecordId(record) !== savedRecipeId);
      try {
        saveSavedRecipeCalculations(records);
        showSavedRecipeList("削除しました");
      } catch (error) {
        const status = document.getElementById("savedRecipeStatus");
        if (status) status.textContent = "削除に失敗しました";
      }
    }

    function bindManufacturingRecordForm(draft = {}) {
      const ids = [
        "recordPrepDate", "recordDate", "recordCategory", "recordRecipe", "recordLot", "recordMemo",
        "recordPackageCount", "recordLossCount", "recordLeftoverWeight"
      ];
      const elements = Object.fromEntries(ids.map((id) => [id, document.getElementById(id)]));
      const savedCalcStatus = document.getElementById("recordSavedCalcStatus");
      const recipeResult = document.getElementById("recordRecipeResult");
      const packageCountLabel = document.getElementById("recordPackageCountLabel");
      const packWeightDisplay = document.getElementById("recordPackWeightDisplay");
      const packCountDisplay = document.getElementById("recordPackCountDisplay");
      const finishedWeightDisplay = document.getElementById("recordFinishedWeightDisplay");
      const yieldDisplay = document.getElementById("recordYieldDisplay");
      const goodNotesText = document.getElementById("recordGoodNotesText");
      const status = document.getElementById("recordStatus");

      const refreshRecipeOptions = () => {
        const options = recordRecipeOptions(elements.recordCategory.value);
        elements.recordRecipe.innerHTML = options.map((option) => `<option value="${option.id}">${option.label}</option>`).join("");
      };

      const applyDraft = () => {
        if (!draft || Object.keys(draft).length === 0) return;
        if (draft.recordCategory) elements.recordCategory.value = draft.recordCategory;
        refreshRecipeOptions();
        ids.forEach((id) => {
          if (draft[id] != null && elements[id]) elements[id].value = draft[id];
        });
      };

      const render = () => {
        const record = collectManufacturingRecord(elements);
        elements.recordLot.value = record.lot;
        packageCountLabel.childNodes[0].nodeValue = `${record.packageCountLabel}\n`;
        if (record.savedCalculation) {
          savedCalcStatus.textContent = "保存済みレシピ計算データを反映しました";
          recipeResult.innerHTML = `${meatInfoHtml({ meat6mm: record.meat6mm, meat3mm: record.meat3mm, meatTotal: record.meatTotal })}${tableHtml(record.recipeRows, record.recipeTotal)}`;
        } else {
          savedCalcStatus.textContent = "保存済みのレシピ計算データが見つかりません。先にレシピページで計算結果を保存してください。";
          recipeResult.innerHTML = "";
        }
        packWeightDisplay.textContent = `${record.unitWeightLabel}: ${record.packWeight == null ? "未設定" : `${formatRecordNumber(record.packWeight)}g`}`;
        packCountDisplay.style.display = record.unitPiecesLabel ? "block" : "none";
        packCountDisplay.textContent = `${record.unitPiecesLabel}: ${record.packPieces == null ? "未設定" : `${record.packPieces}本`}`;
        finishedWeightDisplay.textContent = `完成重量: ${record.finishedWeight == null ? "計算不可" : `${formatRecordNumber(record.finishedWeight)}g`}`;
        yieldDisplay.textContent = `歩留まり率: ${yieldDisplayText(record)}`;
        goodNotesText.value = buildManufacturingRecordText(record);
        saveScreenState("recordForm", ["home", "records", "new"], recordFormDraftValues());
      };

      refreshRecipeOptions();
      applyDraft();
      elements.recordCategory.addEventListener("change", () => {
        refreshRecipeOptions();
        render();
      });
      ids.forEach((id) => {
        if (id !== "recordCategory") elements[id].addEventListener("input", render);
        if (id === "recordRecipe") elements[id].addEventListener("change", render);
      });
      document.getElementById("recordGoodNotes").addEventListener("click", render);
      document.getElementById("recordSave").addEventListener("click", () => {
        const record = collectManufacturingRecord(elements);
        record.id = `${Date.now()}`;
        record.manufacturingRecordId = record.id;
        record.createdAt = new Date().toISOString();
        record.updatedAt = new Date().toISOString();
        record.savedAt = record.createdAt;
        const records = loadManufacturingRecords();
        records.unshift(record);
        try {
          saveManufacturingRecords(records);
          clearScreenState();
          goodNotesText.value = buildManufacturingRecordText(record);
          status.textContent = "保存しました";
        } catch (error) {
          status.textContent = "保存に失敗しました";
        }
      });
      render();
    }

    function collectManufacturingRecord(elements) {
      const option = getRecordRecipeOption(elements.recordRecipe.value, elements.recordCategory.value);
      const savedCalculation = findSavedRecipeCalculation(elements.recordPrepDate.value, option.category, option.savedRecipeName || option.label);
      const packagingSpec = packagingSpecForRecordOption(option);
      const packagingUnit = packagingSpec ? packagingSpec.unit : "";
      const unitWeight = packagingSpec ? packagingSpec.unitWeight : null;
      const unitPieces = packagingSpec ? packagingSpec.unitPieces : null;
      const inputCount = Number(elements.recordPackageCount.value || 0);
      const packageCount = packagingUnit === "本" ? "" : elements.recordPackageCount.value;
      const completedCount = packagingUnit === "本" ? elements.recordPackageCount.value : "";
      const finishedWeight = unitWeight == null ? null : inputCount * unitWeight;
      const theoreticalFinishedWeight = savedCalculation ? Number(savedCalculation.theoreticalFinishedWeight || 0) : 0;
      const yieldRate = finishedWeight == null || theoreticalFinishedWeight <= 0 ? null : finishedWeight / theoreticalFinishedWeight * 100;
      return {
        prepDate: elements.recordPrepDate.value,
        date: elements.recordDate.value,
        category: option.category,
        recipeId: option.id,
        recipeName: option.label,
        savedRecipeName: option.savedRecipeName || option.label,
        recipeCode: option.packagingKey === "herbProduct" ? "HERB-P" : option.packagingKey === "herbEvent" ? "HERB-E" : recipeCodeForRecipe(option.recipe),
        packagingKey: option.packagingKey || "",
        packagingUnit,
        packageCountLabel: packagingUnit === "本" ? "完成本数" : "包装数",
        unitWeightLabel: packagingUnit === "本" ? "1本重量" : "1袋重量",
        unitPiecesLabel: packagingUnit === "袋" ? "1袋本数" : "",
        recipeKind: option.recipe.kind,
        lot: generateManufacturingLot(elements.recordDate.value, option.category, option.recipe, option.packagingKey),
        memo: elements.recordMemo.value.trim(),
        savedRecipeId: savedCalculation ? savedRecipeRecordId(savedCalculation) : "",
        savedCalculationId: savedCalculation ? savedRecipeRecordId(savedCalculation) : "",
        savedCalculation: Boolean(savedCalculation),
        meat6mm: savedCalculation ? Number(savedCalculation.meat6mm || 0) : 0,
        meat3mm: savedCalculation ? Number(savedCalculation.meat3mm || 0) : 0,
        meatTotal: savedCalculation ? Number(savedCalculation.meatTotal || 0) : 0,
        waterAmount: savedCalculation ? Number(savedCalculation.waterAmount || 0) : 0,
        emulsionWeight: savedCalculation ? Number(savedCalculation.emulsionWeight || 0) : 0,
        totalWeight: savedCalculation ? Number(savedCalculation.totalWeight || 0) : 0,
        theoreticalFinishedWeight,
        recipeRows: savedCalculation ? savedCalculation.rows : [],
        recipeTotal: savedCalculation ? Number(savedCalculation.total || 0) : 0,
        packagingUnit,
        packageCount,
        completedCount,
        lossCount: elements.recordLossCount.value,
        leftoverWeight: elements.recordLeftoverWeight.value,
        packWeight: unitWeight,
        packPieces: unitPieces,
        unitWeight,
        unitPieces,
        finishedWeight,
        yieldRate
      };
    }

    function buildManufacturingRecordText(record) {
      const countLabel = record.packagingUnit === "本" ? "完成本数" : "包装数";
      const countValue = record.packagingUnit === "本" ? record.completedCount : record.packageCount;
      const lines = [
        "【製造記録】",
        "",
        `仕込み日：${record.prepDate || ""}`,
        `製造日：${record.date || ""}`,
        `製造区分：${record.category || ""}`,
        `レシピ名：${record.recipeName || record.product || ""}`,
        `ロット番号：${record.lot || ""}`,
        "",
        `肉重量合計：${formatRecordNumber(record.meatTotal)}g`,
        `水：${formatRecordNumber(record.waterAmount)}g`,
        `乳化生地重量：${formatRecordNumber(record.emulsionWeight)}g`,
        `合計重量：${formatRecordNumber(record.totalWeight)}g`,
        "",
        `${countLabel}：${countValue || ""}`,
        `ロス本数：${record.lossCount || ""}`,
        `余り重量：${formatRecordNumber(record.leftoverWeight || 0)}g`,
        `完成重量：${record.finishedWeight == null ? "計算不可" : `${formatRecordNumber(record.finishedWeight)}g`}`,
        `歩留まり率：${yieldDisplayText(record)}`,
        "",
        `メモ：${record.memo || ""}`
      ];
      return lines.join("\n");
    }

    function loadManufacturingRecords() {
      const parsed = readStorageArray(MANUFACTURING_RECORDS_KEY, OLD_MANUFACTURING_RECORDS_KEY);
      let changed = false;
      const normalized = parsed.map((record, index) => {
        let item = record;
        if (!item.manufacturingRecordId && !item.id) {
          changed = true;
          const manufacturingRecordId = `manufacturing-record-${item.savedAt || item.createdAt || Date.now()}-${index}`;
          item = { ...item, id: manufacturingRecordId, manufacturingRecordId };
        }
        const packagingUnit = item.packagingUnit || (item.packageCountLabel === "完成本数" ? "本" : (item.packageCountLabel ? "袋" : ""));
        const packageCount = packagingUnit === "本" ? "" : (item.packageCount || "");
        const completedCount = packagingUnit === "本" ? (item.completedCount || item.packageCount || "") : (item.completedCount || "");
        const recipeRows = Array.isArray(item.recipeRows) ? item.recipeRows : [];
        const recipeTotal = Number(item.recipeTotal != null ? item.recipeTotal : sumRows(recipeRows));
        const meatTotal = Number(item.meatTotal || 0);
        const waterAmount = Number(item.waterAmount != null ? item.waterAmount : amountFromRows(recipeRows, "水"));
        const totalWeight = Number(item.totalWeight != null ? item.totalWeight : meatTotal + recipeTotal);
        const theoreticalFinishedWeight = Number(item.theoreticalFinishedWeight != null ? item.theoreticalFinishedWeight : totalWeight);
        const finishedWeight = item.finishedWeight == null || item.finishedWeight === "" ? null : Number(item.finishedWeight);
        const yieldRate = finishedWeight == null || theoreticalFinishedWeight <= 0 ? null : finishedWeight / theoreticalFinishedWeight * 100;
        const normalizedItem = {
          ...item,
          packagingUnit,
          packageCount,
          completedCount,
          waterAmount,
          totalWeight,
          theoreticalFinishedWeight,
          leftoverWeight: item.leftoverWeight || "0",
          recipeTotal,
          finishedWeight,
          yieldRate
        };
        if (JSON.stringify(normalizedItem) !== JSON.stringify(item)) changed = true;
        return normalizedItem;
      });
      if (changed) {
        localStorage.setItem(MANUFACTURING_RECORDS_KEY, JSON.stringify(normalized));
      }
      return normalized;
    }

    function saveManufacturingRecords(records) {
      localStorage.setItem(MANUFACTURING_RECORDS_KEY, JSON.stringify(records));
    }

    function manufacturingRecordId(record) {
      return record.manufacturingRecordId || record.id;
    }

    function bindManufacturingRecordEdit(record) {
      const prepDate = document.getElementById("editRecordPrepDate");
      const date = document.getElementById("editRecordDate");
      const packageCount = document.getElementById("editRecordPackageCount");
      const lossCount = document.getElementById("editRecordLossCount");
      const leftoverWeight = document.getElementById("editRecordLeftoverWeight");
      const memo = document.getElementById("editRecordMemo");
      const preview = document.getElementById("recordEditPreview");
      const renderPreview = () => {
        const updated = recalculateManufacturingRecord(record, prepDate.value, date.value, packageCount.value, lossCount.value, leftoverWeight.value, memo.value);
        preview.innerHTML = manufacturingRecordReadHtml(updated);
        document.getElementById("recordDetailText").value = buildManufacturingRecordText(updated);
      };
      [prepDate, date, packageCount, lossCount, leftoverWeight, memo].forEach((element) => element.addEventListener("input", renderPreview));
      document.getElementById("recordEditCancel").addEventListener("click", () => showManufacturingRecordDetail(manufacturingRecordId(record)));
      document.getElementById("recordEditSave").addEventListener("click", () => {
        const updated = recalculateManufacturingRecord(record, prepDate.value, date.value, packageCount.value, lossCount.value, leftoverWeight.value, memo.value);
        const records = loadManufacturingRecords();
        const index = records.findIndex((item) => manufacturingRecordId(item) === manufacturingRecordId(record));
        if (index >= 0) records[index] = updated;
        try {
          saveManufacturingRecords(records);
          showManufacturingRecordDetail(manufacturingRecordId(record), false, "更新しました");
        } catch (error) {
          document.getElementById("recordDetailStatus").textContent = "保存に失敗しました";
        }
      });
      renderPreview();
    }

    function recalculateManufacturingRecord(record, prepDate, date, countValue, lossCount, leftoverWeight, memo) {
      const count = Number(countValue || 0);
      const unitWeight = record.unitWeight == null && record.packWeight == null ? null : Number(record.unitWeight != null ? record.unitWeight : record.packWeight);
      const finishedWeight = unitWeight == null ? null : count * unitWeight;
      const theoreticalFinishedWeight = Number(record.theoreticalFinishedWeight || 0);
      const yieldRate = finishedWeight == null || theoreticalFinishedWeight <= 0 ? null : finishedWeight / theoreticalFinishedWeight * 100;
      return {
        ...record,
        prepDate,
        date,
        lot: generateLotFromExistingRecord(record, date),
        packageCount: record.packagingUnit === "本" ? "" : countValue,
        completedCount: record.packagingUnit === "本" ? countValue : (record.completedCount || ""),
        lossCount,
        leftoverWeight,
        memo,
        finishedWeight,
        yieldRate,
        updatedAt: new Date().toISOString()
      };
    }

    function generateLotFromExistingRecord(record, date) {
      const code = record.recipeCode || recipeCodeFromRecord(record);
      const datePart = (date || todayString()).replace(/-/g, "");
      const categoryCode = record.category === "自社レシピ" ? "JI" : "IT";
      const base = `${datePart}-${categoryCode}-${code}`;
      if (String(record.lot || "").startsWith(`${base}-`)) return record.lot;
      const count = loadManufacturingRecords().filter((item) => manufacturingRecordId(item) !== manufacturingRecordId(record) && String(item.lot || "").startsWith(base)).length + 1;
      return `${base}-${String(count).padStart(2, "0")}`;
    }

    function recipeCodeFromRecord(record) {
      if (record.packagingKey === "arabiki" || record.recipeName === "あらびき") return "ARABIKI";
      if (record.packagingKey === "cheese" || record.recipeName === "チーズ") return "CHEESE";
      if (record.packagingKey === "herbProduct") return "HERB-P";
      if (record.packagingKey === "herbEvent") return "HERB-E";
      if (String(record.recipeName || "").includes("ハーブ")) return "HERB";
      if (record.packagingKey === "chorizo" || record.recipeName === "チョリソー") return "CHORIZO";
      if (String(record.recipeName || "").includes("山小屋")) return "YAMAGOYA";
      if (String(record.recipeName || "").includes("ジビエ")) return "GIBIER";
      if (String(record.recipeName || "").includes("峠")) return "TOUGE";
      return "RECIPE";
    }

    function deleteManufacturingRecord(recordId) {
      if (!confirm("この製造記録を削除しますか？この操作は元に戻せません。")) return;
      const records = loadManufacturingRecords().filter((record) => manufacturingRecordId(record) !== recordId);
      try {
        saveManufacturingRecords(records);
        showManufacturingRecordHistory(showManufacturingRecordTop, "削除しました");
      } catch (error) {
        const status = document.getElementById("recordDetailStatus");
        if (status) status.textContent = "削除に失敗しました";

    function showManufacturingRecordCsv() {
      setHeader("CSV出力", "UTF-8 BOM付き", true, showManufacturingRecordTop);
      const records = loadManufacturingRecords();
      app.innerHTML = `
        <section class="section">
          <h2>CSV出力</h2>
          <div class="empty">保存済み製造記録：${records.length}件</div>
          <div class="record-actions">
            <button id="recordCsvDownload" class="primary" type="button" ${records.length === 0 ? "disabled" : ""}>CSVをダウンロード</button>
          </div>
          <div id="recordCsvStatus" class="status"></div>
        </section>
      `;
      document.getElementById("recordCsvDownload").addEventListener("click", () => downloadManufacturingRecordsCsv(records));
    }

    function downloadManufacturingRecordsCsv(records) {
      const rows = records.map((record) => [
        record.prepDate, record.date, record.category, record.recipeName || record.product, record.lot,
        csvNumber(record.meat6mm), csvNumber(record.meat3mm), csvNumber(record.meatTotal), csvNumber(record.waterAmount),
        csvNumber(record.emulsionWeight), csvNumber(record.totalWeight), record.packagingUnit,
        record.packageCount || "", record.completedCount || "", record.lossCount, csvNumber(record.leftoverWeight || 0),
        csvNullableNumber(record.finishedWeight), csvNullableNumber(record.yieldRate), record.memo
      ]);
      const csv = [MANUFACTURING_RECORD_CSV_HEADERS, ...rows].map((row) => row.map(csvCell).join(",")).join("\r\n");
      const blob = new Blob(["\ufeff", csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `manufacturing-records-${todayString()}.csv`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      const status = document.getElementById("recordCsvStatus");
      if (status) status.textContent = "CSVを出力しました";
    }

    function csvCell(value) {
      const text = value == null ? "" : String(value);
      return `"${text.replace(/"/g, '""')}"`;
    }

    function csvNumber(value) {
      const numeric = Number(value);
      return Number.isFinite(numeric) ? numeric.toFixed(1) : "0.0";
    }

    function csvNullableNumber(value) {
      if (value == null || value === "") return "";
      const numeric = Number(value);
      return Number.isFinite(numeric) ? numeric.toFixed(1) : "";
    }

    function formatRecordNumber(value) {
      const numeric = Number(value);
      return formatNumber(Number.isFinite(numeric) ? numeric : 0);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function showComingSoon(title) {
      setHeader(title, "準備中", true);
      app.innerHTML = `<section class="section"><h2>${title}</h2><div class="empty">準備中です。</div></section>`;

    function recipeOptions() {
      const own = Object.entries(ownRecipes).map(([id, recipe]) => ({ id: `own:${id}`, label: `自社 / ${recipe.name}` }));
      const outsourced = Object.entries(outsourceClients)
        .filter(([, client]) => client.recipe)
        .map(([id, client]) => ({ id: `client:${id}`, label: `委託 / ${client.name}` }));
      return [...own, ...outsourced];
    }

    function getRecipeByOptionId(optionId) {
      const [type, id] = optionId.split(":");
      if (type === "own") return ownRecipes[id];
      if (type === "client") return outsourceClients[id].recipe;
      return ownRecipes.arabiki;

      app.innerHTML = `<section class="section">${recipeCalculatorContentHtml(recipe, `recipe-${recipeId}`, true)}</section>`;

    function recipeCalculatorContentHtml(recipe, prefix, includeCopy) {
      if (recipe.kind === "gibier") return gibierCalculatorContentHtml(recipe, prefix, includeCopy);

          </label>

        <div class="product-name">${recipe.productName || recipe.name}</div>
        <div class="field-row">
          ${usesSplitMeatInput ? `
            <label>6mm肉重量(g)
              <input id="${prefix}-meat6mm" type="number" min="0" step="1" value="1000">
            </label>
            <label>3mm肉重量(g)
              <input id="${prefix}-meat3mm" type="number" min="0" step="1" value="0">
            </label>
            <div class="product-name" id="${prefix}-meatTotalDisplay">肉重量合計(g): 1,000.0g</div>
          ` : ""}
          ${isOwn ? `
            <label>計算結果の表示
              <select id="${prefix}-split">
                <option value="1">分割なし</option>

            <div class="radio-group" role="radiogroup" aria-label="乳化生地">

                <input id="${prefix}-emulsionAuto" name="${prefix}-emulsionMode" type="radio" value="auto" checked>
                乳化生地 自動計算
              </label>
              <label class="radio-option">
                <input id="${prefix}-emulsionManual" name="${prefix}-emulsionMode" type="radio" value="manual">
                乳化生地 手入力
              </label>
            </div>
            <label id="${prefix}-manualEmulsionWrap" style="display:none">乳化生地重量(g)
              <input id="${prefix}-emulsion" type="number" min="0" step="1" value="0">
            </label>
          ` : !usesSplitMeatInput ? `
            <label>肉重量(g)
              <input id="${prefix}-meat" type="number" min="0" step="1" value="1000">
            </label>
          ` : ""}
          <button id="${prefix}-saveCalc" class="secondary" type="button">この計算結果を保存</button>
          <button id="${prefix}-copy" class="primary" type="button">${includeCopy ? "GoodNotes用コピー" : "計算結果をコピー"}</button>
        </div>
        ${isOwn ? `<p class="note">自動計算: 乳化生地 =（肉重量＋水）×0.2 / 手入力: 入力値をそのまま使用</p>` : ""}
        <div id="${prefix}-result"></div>
        <div class="copy-area">
          <textarea id="${prefix}-copyText" readonly></textarea>

    function bindRecipeCalculator(recipe, prefix) {
      if (recipe.kind === "gibier") {
        bindGibierCalculator(recipe, prefix);
        return;
      }
      const productionDateInput = document.getElementById(`${prefix}-productionDate`);
      const meatInput = document.getElementById(`${prefix}-meat`);
      const meat6mmInput = document.getElementById(`${prefix}-meat6mm`);
      const meat3mmInput = document.getElementById(`${prefix}-meat3mm`);
      const meatTotalDisplay = document.getElementById(`${prefix}-meatTotalDisplay`);
      const emulsionInput = document.getElementById(`${prefix}-emulsion`);
      const emulsionAuto = document.getElementById(`${prefix}-emulsionAuto`);
      const emulsionManual = document.getElementById(`${prefix}-emulsionManual`);
      const manualEmulsionWrap = document.getElementById(`${prefix}-manualEmulsionWrap`);
      const splitSelect = document.getElementById(`${prefix}-split`);
      const result = document.getElementById(`${prefix}-result`);
      const copyText = document.getElementById(`${prefix}-copyText`);
      const copyButton = document.getElementById(`${prefix}-copy`);
      const saveCalcButton = document.getElementById(`${prefix}-saveCalc`);
      const status = document.getElementById(`${prefix}-status`);
      let latestCalculation = null;

      const render = () => {
        const meat6mm = meat6mmInput ? Math.max(Number(meat6mmInput.value || 0), 0) : 0;
        const meat3mm = meat3mmInput ? Math.max(Number(meat3mmInput.value || 0), 0) : 0;
        const meat = meatInput ? Math.max(Number(meatInput.value || 0), 0) : meat6mm + meat3mm;
        if (meatTotalDisplay) meatTotalDisplay.textContent = `肉重量合計(g): ${formatNumber(meat)}g`;
        const water = meat * 0.2;
        const useManualEmulsion = Boolean(emulsionManual && emulsionManual.checked);
        const emulsion = emulsionInput && useManualEmulsion ? Math.max(Number(emulsionInput.value || 0), 0) : (meat + water) * 0.2;
        if (manualEmulsionWrap) manualEmulsionWrap.style.display = useManualEmulsion ? "grid" : "none";
        const emulsionMode = useManualEmulsion ? "手入力" : "自動計算";
        const recipeNameForCalc = recipe.baseRecipeName || recipe.name;
        const rows = recipe.kind === "yamanoya" ? calculateYamanoya(meat) : calculateOwnRecipe(recipeNameForCalc, meat, emulsion, emulsionMode);
        const total = rows.reduce((sum, row) => sum + row.calculated, 0);
        const splitCount = splitSelect ? Number(splitSelect.value || 1) : 1;
        const splitLabel = splitLabelText(splitCount);
        const displayRows = splitRows(rows, splitCount);
        const displayTotal = total / splitCount;
        const splitMeatInfo = meatTotalDisplay ? {
          meat6mm: meat6mm / splitCount,
          meat3mm: meat3mm / splitCount,
          meatTotal: meat / splitCount
        } : null;
        result.innerHTML = `${splitCount > 1 ? `<p class="note">表示：${splitLabel}（1回分あたりの分量）</p>` : ""}${meatInfoHtml(splitMeatInfo)}${tableHtml(displayRows, displayTotal)}`;
        if (recipe.kind === "touge") {
          copyText.value = buildTougeCopyText(recipe, displayRows, displayTotal, productionDateInput.value, splitLabel, splitMeatInfo, emulsionMode);
        } else {
          copyText.value = buildCopyText(recipe.name, displayRows, displayTotal, "g", productionDateInput.value, splitSelect ? splitLabel : null, splitMeatInfo);
        }
        latestCalculation = {
          prepDate: productionDateInput.value,
          category: recipeRecordCategory(recipe),
          recipeName: recordRecipeDisplayName(recipe),
          savedRecipeName: recipe.baseRecipeName || recipe.name,
          recipeCode: recipeCodeForRecipe(recipe),
          recipeKind: recipe.kind,
          meat6mm,
          meat3mm,
          meatTotal: meat,
          emulsionWeight: recipe.kind === "own" || recipe.kind === "touge" ? emulsion : 0,
          rows,
          total,
          savedAt: new Date().toISOString()
        };
      };

      productionDateInput.addEventListener("input", render);
      if (meatInput) meatInput.addEventListener("input", render);
      if (meat6mmInput) meat6mmInput.addEventListener("input", render);
      if (meat3mmInput) meat3mmInput.addEventListener("input", render);
      if (emulsionInput) emulsionInput.addEventListener("input", render);
      if (emulsionAuto) emulsionAuto.addEventListener("change", render);
      if (emulsionManual) emulsionManual.addEventListener("change", render);
      if (splitSelect) splitSelect.addEventListener("change", render);
      copyButton.addEventListener("click", () => copyToClipboard(copyText.value, status));
      saveCalcButton.addEventListener("click", () => {
        try {
          saveRecipeCalculation(latestCalculation);
          showTemporaryStatus(status, "計算結果を保存しました");
        } catch (error) {
          showTemporaryStatus(status, "保存できませんでした", "error");
        }
      });
      render();
    }

    function gibierCalculatorContentHtml(recipe, prefix, includeCopy) {
      return `
        <div class="field-row">
          <label>仕込日
            <input id="${prefix}-productionDate" type="date" value="${todayString()}">
          </label>
        </div>
        <div class="product-name">${recipe.productName || recipe.name}</div>
        <div class="field-row">
          <label>鹿肉重量(g)
            <input id="${prefix}-deer" type="number" min="0" step="1" value="7000">
          </label>
          <label>豚ひき肉重量(g)
            <input id="${prefix}-pork" type="number" min="0" step="1" value="3000">
          </label>
          <button id="${prefix}-saveCalc" class="secondary" type="button">この計算結果を保存</button>
          <button id="${prefix}-copy" class="primary" type="button">${includeCopy ? "GoodNotes用コピー" : "計算結果をコピー"}</button>
        </div>
        <ul class="spec-list">
          <li>鹿肉: ジビエセンターから支給</li>
          <li>豚ひき肉: エーコープで仕入</li>
        </ul>
        <div id="${prefix}-result"></div>
        <div class="copy-area">
          <textarea id="${prefix}-copyText" readonly></textarea>
          <div id="${prefix}-status" class="status"></div>
        </div>
      `;
    }

    function bindGibierCalculator(recipe, prefix) {
      const productionDateInput = document.getElementById(`${prefix}-productionDate`);
      const deerInput = document.getElementById(`${prefix}-deer`);
      const porkInput = document.getElementById(`${prefix}-pork`);
      const result = document.getElementById(`${prefix}-result`);
      const copyText = document.getElementById(`${prefix}-copyText`);
      const copyButton = document.getElementById(`${prefix}-copy`);
      const saveCalcButton = document.getElementById(`${prefix}-saveCalc`);
      const status = document.getElementById(`${prefix}-status`);
      let latestCalculation = null;

      const render = () => {
        const deer = Math.max(Number(deerInput.value || 0), 0);
        const pork = Math.max(Number(porkInput.value || 0), 0);
        const rows = calculateGibier(deer, pork);
        const total = rows.reduce((sum, row) => sum + row.calculated, 0);
        result.innerHTML = tableHtml(rows, total);
        copyText.value = buildGibierCopyText(recipe, productionDateInput.value, rows, total);
        latestCalculation = {
          prepDate: productionDateInput.value,
          category: "委託製造",
          recipeName: recordRecipeDisplayName(recipe),
          savedRecipeName: recordRecipeDisplayName(recipe),
          recipeCode: recipeCodeForRecipe(recipe),
          recipeKind: recipe.kind,
          meat6mm: deer,
          meat3mm: pork,
          meatTotal: deer + pork,
          emulsionWeight: 0,
          rows,
          total,
          savedAt: new Date().toISOString()
        };
      };

      productionDateInput.addEventListener("input", render);
      deerInput.addEventListener("input", render);
      porkInput.addEventListener("input", render);
      copyButton.addEventListener("click", () => copyToClipboard(copyText.value, status));
      saveCalcButton.addEventListener("click", () => {
        try {
          saveRecipeCalculation(latestCalculation);
          showTemporaryStatus(status, "計算結果を保存しました");
        } catch (error) {
          showTemporaryStatus(status, "保存できませんでした", "error");
        }
      });
      render();
    }

    function calculateOwnRecipe(recipeName, meat, emulsion, emulsionMode = "自動計算") {
      const water = meat * 0.2;
      const meatWater = meat + water;
      const meatWaterEmulsion = meat + water + emulsion;
      const rows = [
        { name: "肉重量", group: "入力", calculated: meat },
        { name: "水", group: "肉重量×0.2", calculated: water },
        { name: "乳化生地", group: emulsionMode === "手入力" ? "手入力値をそのまま使用" : "（肉重量＋水）×0.2", calculated: emulsion },
        { name: "塩", group: "（肉重量＋水）×1.6%", calculated: meatWater * 0.016 }
      ];

      if (recipeName === "あらびき" || recipeName === "チーズ") {
        rows.push({ name: "ウインナーヘラマント", group: "（肉重量＋水＋乳化生地）×0.5%", calculated: meatWaterEmulsion * 0.005 });
      }

      if (recipeName === "ハーブ") {
        rows.push({ name: "ブラートブルストD", group: "（肉重量＋水＋乳化生地）×0.5%", calculated: meatWaterEmulsion * 0.005 });
      }

      rows.push(
        { name: "ヘラビンE", group: "（肉重量＋水）×0.3%", calculated: meatWater * 0.003 },
        { name: "ペルビナールHH", group: "（肉重量＋水）×0.1%", calculated: meatWater * 0.001 }
      );

      if (recipeName === "チーズ") {
        rows.push({ name: "チーズ", group: "（肉重量＋水＋乳化生地）×10%", calculated: meatWaterEmulsion * 0.10 });
      }

      if (recipeName === "ハーブ") {
        rows.push(
          { name: "マジョラム", group: "（肉重量＋水＋乳化生地）×0.1%", calculated: meatWaterEmulsion * 0.001 },
          { name: "バジル", group: "（肉重量＋水＋乳化生地）×0.05%", calculated: meatWaterEmulsion * 0.0005 },
          { name: "オレガノ", group: "（肉重量＋水＋乳化生地）×0.05%", calculated: meatWaterEmulsion * 0.0005 }
        );
      }

      if (recipeName === "チョリソー") {
        rows.push(
          { name: "チョリソースパイス", group: "（肉重量＋水＋乳化生地）×1.2%", calculated: meatWaterEmulsion * 0.012 },
          { name: "唐辛子", group: "（肉重量＋水＋乳化生地）×0.2%", calculated: meatWaterEmulsion * 0.002 }
        );
      }

      return rows;
    }

    function calculateYamanoya(meat) {
      const backFat = meat * 0.16;
      const water = (meat + backFat) * 0.2;
      const base = meat + backFat + water;
      return [
        { name: "肉重量", group: "入力", calculated: meat },
        { name: "背脂", group: "肉重量×16%", calculated: backFat },
        { name: "水", group: "（肉重量＋背脂）×0.2", calculated: water },
        { name: "塩", group: "（肉重量＋背脂＋水）×1.6%", calculated: base * 0.016 },
        { name: "スパイス", group: "（肉重量＋背脂＋水）×1.6%", calculated: base * 0.016 },
        { name: "ヘラビンE", group: "（肉重量＋背脂＋水）×0.3%", calculated: base * 0.003 },
        { name: "ペルビナールHH", group: "（肉重量＋背脂＋水）×0.1%", calculated: base * 0.001 }
      ];
    }

    function calculateGibier(deer, pork) {
      const meatTotal = deer + pork;
      const water = meatTotal * 0.2;
      const base = meatTotal + water;
      return [
        { name: "鹿肉重量", group: "入力 / ジビエセンターから支給", calculated: deer },
        { name: "豚ひき肉重量", group: "入力 / エーコープで仕入", calculated: pork },
        { name: "水", group: "（鹿肉＋豚ひき肉）×0.2", calculated: water },
        { name: "塩", group: "（鹿肉＋豚ひき肉＋水）×1.6%", calculated: base * 0.016 },
        { name: "ウインナーヘラマント", group: "（鹿肉＋豚ひき肉＋水）×0.5%", calculated: base * 0.005 },
        { name: "ヘラビンE", group: "（鹿肉＋豚ひき肉＋水）×0.3%", calculated: base * 0.003 },
        { name: "ペルビナールHH", group: "（鹿肉＋豚ひき肉＋水）×0.1%", calculated: base * 0.001 }
      ];
    }

    function tableHtml(rows, total, unit = "g") {
      return `
        <div class="result-box">
          ${rows.map((row) => `
            <div class="result-row">
              <div class="result-name">${row.name}</div>
              <div class="result-value">${formatNumber(row.calculated)}${unit}</div>
              ${row.group ? `<div class="result-formula">${row.group}</div>` : ""}
            </div>
          `).join("")}
          <div class="result-row">
            <div class="result-name">合計</div>
            <div class="result-value">${formatNumber(total)}${unit}</div>
          </div>
        </div>
      `;
    }

    function meatInfoHtml(meatInfo, unit = "g") {
      if (!meatInfo) return "";
      return `
        <div class="result-box meat-info-box">
          <div class="result-subtitle">肉重量内訳</div>
          <div class="result-row">
            <div class="result-name">6mm肉重量</div>
            <div class="result-value">${formatNumber(meatInfo.meat6mm)}${unit}</div>
          </div>
          <div class="result-row">
            <div class="result-name">3mm肉重量</div>
            <div class="result-value">${formatNumber(meatInfo.meat3mm)}${unit}</div>
          </div>
          <div class="result-row">
            <div class="result-name">肉重量合計</div>
            <div class="result-value">${formatNumber(meatInfo.meatTotal)}${unit}</div>
          </div>
        </div>
      `;
    }

    function splitLabelText(splitCount) {
      if (splitCount === 2) return "2等分";
      if (splitCount === 3) return "3等分";
      if (splitCount === 4) return "4等分";
      return "分割なし";
    }

    function splitRows(rows, splitCount) {
      return rows.map((row) => ({
        ...row,
        calculated: row.calculated / splitCount
      }));
    }

    function buildCopyText(title, rows, total, unit = "g", productionDate = todayString(), splitLabel = null, meatInfo = null) {
      const lines = [title, `製造日：${productionDate}`];
      if (splitLabel) {
        lines.push(`表示：${splitLabel}`);
        if (splitLabel !== "分割なし") lines.push("※以下は1回分あたりの分量");
      }
      lines.push("");
      if (meatInfo) {
        lines.push(`6mm肉重量：${formatNumber(meatInfo.meat6mm)}${unit}`);
        lines.push(`3mm肉重量：${formatNumber(meatInfo.meat3mm)}${unit}`);
        lines.push(`肉重量合計：${formatNumber(meatInfo.meatTotal)}${unit}`);
        lines.push("");
      }
      rows.forEach((row) => lines.push(`${row.name}: ${formatNumber(row.calculated)}${unit}`));
      lines.push("", `合計: ${formatNumber(total)}${unit}`);
      return lines.join("\n");
    }

    function buildGibierCopyText(recipe, productionDate, rows, total) {
      const lines = [
        "委託製造: ジビエセンター",
        `商品名: ${recipe.productName || "鹿ソーセージ"}`,
        `製造日：${productionDate}`,
        "",
        "材料・計算結果"
      ];
      rows.forEach((row) => lines.push(`${row.name}: ${formatNumber(row.calculated)}g`));
      lines.push(
        "",
        `合計: ${formatNumber(total)}g`,
        "",
        "製造仕様",
        "長さ: 15cm",
        "ケーシング: 羊腸24-26",
        "袋詰め: なし"
      );
      return lines.join("\n");
    }

    function buildTougeCopyText(recipe, rows, total, productionDate, splitLabel, meatInfo, emulsionMode) {
      const lines = [
        "委託先：峠の茶屋",
        `商品名：${recipe.productName || recipe.name}`,
        `製造日：${productionDate}`,
        `乳化生地設定：${emulsionMode}`,
        `分割表示設定：${splitLabel || "分割なし"}`
      ];
      if (splitLabel && splitLabel !== "分割なし") lines.push("※以下は1回分あたりの分量");
      lines.push("");
      if (meatInfo) {
        lines.push(`6mm肉重量：${formatNumber(meatInfo.meat6mm)}g`);
        lines.push(`3mm肉重量：${formatNumber(meatInfo.meat3mm)}g`);
        lines.push(`肉重量合計：${formatNumber(meatInfo.meatTotal)}g`);
        lines.push("");
      }
      rows.forEach((row) => lines.push(`${row.name}: ${formatNumber(row.calculated)}g`));
      lines.push(
        "",
        `合計: ${formatNumber(total)}g`,
        "",
        "製造仕様",
        "ケーシング: 羊腸22-24",
        "長さ: 10cm",
        "規格袋: 12-17",
        "袋詰め: あらびき、ハーブを1本ずつの計2本で袋詰め"
      );
      return lines.join("\n");
    }

    function showClient(clientId) {
      const client = outsourceClients[clientId];
      setHeader(client.name, "委託先 専用ページ", true, () => showCategory("clients"));

        app.innerHTML = `<section class="section"><h2>${client.name}</h2><div class="empty">追加予定です。配合仕様は要確認です。</div></section>`;

        <div class="tabbar">
          <button class="tab ${appState.activeClientTab === "calc" ? "active" : ""}" data-tab="calc" type="button">${client.suppliedDough ? "作業メモ" : "配合計算"}</button>

        body.innerHTML = `
          <section class="section">${recipeCalculatorContentHtml(client.recipe, "client-recipe", true)}</section>
          <h2>製造仕様</h2>
          <ul class="spec-list">${client.specs.map((spec) => `<li>${spec}</li>`).join("")}</ul>
        `;
        bindRecipeCalculator(client.recipe, "client-recipe");
        return;
      }

      if (appState.activeClientTab === "spec") {
        body.innerHTML = `<section class="section"><h2>製造仕様</h2><ul class="spec-list">${client.specs.map((spec) => `<li>${spec}</li>`).join("")}</ul></section>`;
        return;
      }

      body.innerHTML = `
        <section class="section">
          <h2>山小屋 スパイス配合表</h2>

              <select id="spiceRuns">

            </label>
            <label>任意回数
              <input id="customSpiceRuns" type="number" min="1" step="1" value="1">
            </label>
            <button id="spiceCopy" class="primary" type="button">スパイス表をコピー</button>
          </div>
          <details>
            <summary>配合表を表示</summary>
            <div class="details-body" id="spiceResult"></div>
          </details>
          <div class="copy-area">
            <textarea id="spiceCopyText" readonly></textarea>
            <div id="spiceStatus" class="status"></div>
          </div>
        </section>
      `;
      bindSpiceCalculator(client);
    }

    function suppliedDoughContentHtml(client, prefix) {
      return `
        <section class="section">
          <div class="field-row">
            <label>製造日
              <input id="${prefix}-productionDate" type="date" value="${todayString()}">
            </label>
          </div>
          <div class="product-name">${client.suppliedDough.productName}</div>
          <div class="field-row">
            <label>生地重量(g)
              <input id="${prefix}-weight" type="number" min="0" step="1" value="0">
            </label>
            <button id="${prefix}-copy" class="primary" type="button">GoodNotes用コピー</button>
          </div>
          <section class="section">
            <h2>製造仕様</h2>
            <ul class="spec-list">${client.specs.map((spec) => `<li>${spec}</li>`).join("")}</ul>
          </section>
          <div class="copy-area">
            <textarea id="${prefix}-copyText" readonly></textarea>
            <div id="${prefix}-status" class="status"></div>
          </div>
        </section>
      `;
    }

    function bindSuppliedDough(client, prefix) {
      const productionDate = document.getElementById(`${prefix}-productionDate`);
      const weight = document.getElementById(`${prefix}-weight`);
      const copyText = document.getElementById(`${prefix}-copyText`);
      const copyButton = document.getElementById(`${prefix}-copy`);
      const status = document.getElementById(`${prefix}-status`);

      const render = () => {
        copyText.value = buildSuppliedDoughCopyText(client, productionDate.value, Number(weight.value || 0));
      };

      productionDate.addEventListener("input", render);
      weight.addEventListener("input", render);
      copyButton.addEventListener("click", () => copyToClipboard(copyText.value, status));
      render();
    }

    function buildSuppliedDoughCopyText(client, productionDate, doughWeight) {
      return [
        `委託先：${client.name}`,
        `商品名：${client.suppliedDough.productName}`,
        `製造日：${productionDate}`,
        `生地重量：${formatNumber(doughWeight)}g`,
        "",
        "製造仕様",
        "生地支給: レシピなし",
        "挽き目: 生地全量を6mmで挽く",
        "ケーシング: 羊腸22-24（支給）",
        "長さ: 13.5cm",
        "規格袋: 15-25（支給）",
        "袋詰め: 1袋5本詰め"
      ].join("\n");
    }

    function bindSpiceCalculator(client) {
      const runsSelect = document.getElementById("spiceRuns");
      const customRuns = document.getElementById("customSpiceRuns");
      const result = document.getElementById("spiceResult");
      const copyText = document.getElementById("spiceCopyText");
      const copyButton = document.getElementById("spiceCopy");
      const status = document.getElementById("spiceStatus");

      const render = () => {
        const runs = runsSelect.value === "custom" ? Math.max(Number(customRuns.value || 1), 1) : Number(runsSelect.value);
        customRuns.disabled = runsSelect.value !== "custom";
        const rows = client.spiceMix.map((item) => ({ name: item.name, group: `${formatNumber(item.amount)}g × ${runs}回`, calculated: item.amount * runs }));
        const total = rows.reduce((sum, row) => sum + row.calculated, 0);
        result.innerHTML = tableHtml(rows, total);
        copyText.value = buildCopyText(`${client.name} スパイス配合表 ${runs}回分`, rows, total);
      };

      runsSelect.addEventListener("change", render);
      customRuns.addEventListener("input", render);
      copyButton.addEventListener("click", () => copyToClipboard(copyText.value, status));
      render();
    }

    function showCuring(type) {
      if (type === "bacon") showBacon();
      if (type === "prosciutto") showProsciutto();
    }

    function showBacon() {
      setHeader("ベーコン", "塩・三温糖・塩漬け予定", true, () => showCategory("curing"));
      app.innerHTML = `
        <section class="section">
          <div class="field-row">
            <label>製造日
              <input id="baconProductionDate" type="date" value="${todayString()}">
            </label>
          </div>
          <div class="product-name">ベーコン</div>
          <div class="field-row">
            <label>豚バラ肉重量(g)
              <input id="baconWeight" type="number" min="0" step="1" value="1000">
            </label>
            <label>塩漬け開始日
              <input id="baconStart" type="date" value="${todayString()}">
            </label>
            <button id="baconCopy" class="primary" type="button">GoodNotes用コピー</button>
          </div>
          <div id="baconResult"></div>
          <div class="copy-area">
            <textarea id="baconText" readonly></textarea>
            <div id="baconStatus" class="status"></div>
          </div>
        </section>
      `;
      const productionDate = document.getElementById("baconProductionDate");
      const weight = document.getElementById("baconWeight");
      const start = document.getElementById("baconStart");
      const result = document.getElementById("baconResult");
      const text = document.getElementById("baconText");
      const status = document.getElementById("baconStatus");
      const render = () => {
        const pork = Math.max(Number(weight.value || 0), 0);
        const rows = [
          { name: "豚バラ肉重量", group: "入力", calculated: pork },
          { name: "塩", group: "豚バラ肉重量×2.5%", calculated: pork * 0.025 },
          { name: "三温糖", group: "塩×25%", calculated: pork * 0.025 * 0.25 }
        ];
        const endDate = addDays(start.value, 7);
        result.innerHTML = tableHtml(rows, rows.reduce((sum, row) => sum + row.calculated, 0));
        text.value = `${buildCopyText("ベーコン", rows, rows.reduce((sum, row) => sum + row.calculated, 0), "g", productionDate.value)}\n塩漬け開始日: ${start.value}\n塩漬け終了予定: ${endDate}`;
      };
      productionDate.addEventListener("input", render);
      weight.addEventListener("input", render);
      start.addEventListener("input", render);
      document.getElementById("baconCopy").addEventListener("click", () => copyToClipboard(text.value, status));
      render();
    }

    function showProsciutto() {
      setHeader("生ハム", "塩・熟成完了予定", true, () => showCategory("curing"));
      app.innerHTML = `
        <section class="section">
          <div class="field-row">
            <label>製造日
              <input id="prosciuttoProductionDate" type="date" value="${todayString()}">
            </label>
          </div>
          <div class="product-name">生ハム</div>
          <div class="field-row">
            <label>骨付きもも肉重量(g)
              <input id="prosciuttoWeight" type="number" min="0" step="1" value="1000">
            </label>
            <label>仕込み日
              <input id="prosciuttoStart" type="date" value="${todayString()}">
            </label>
            <label>熟成期間
              <select id="prosciuttoMonths">
                <option value="12">12か月</option>
                <option value="18">18か月</option>
              </select>
            </label>
            <button id="prosciuttoCopy" class="primary" type="button">GoodNotes用コピー</button>
          </div>
          <div id="prosciuttoResult"></div>
          <div class="copy-area">
            <textarea id="prosciuttoText" readonly></textarea>
            <div id="prosciuttoStatus" class="status"></div>
          </div>
        </section>
      `;
      const productionDate = document.getElementById("prosciuttoProductionDate");
      const weight = document.getElementById("prosciuttoWeight");
      const start = document.getElementById("prosciuttoStart");
      const months = document.getElementById("prosciuttoMonths");
      const result = document.getElementById("prosciuttoResult");
      const text = document.getElementById("prosciuttoText");
      const status = document.getElementById("prosciuttoStatus");
      const render = () => {
        const pork = Math.max(Number(weight.value || 0), 0);
        const rows = [
          { name: "骨付きもも肉重量", group: "入力", calculated: pork },
          { name: "塩", group: "骨付きもも肉重量×10%", calculated: pork * 0.10 }
        ];
        const endDate = addMonths(start.value, months.value);
        result.innerHTML = tableHtml(rows, rows.reduce((sum, row) => sum + row.calculated, 0));
        text.value = `${buildCopyText("生ハム", rows, rows.reduce((sum, row) => sum + row.calculated, 0), "g", productionDate.value)}\n仕込み日: ${start.value}\n熟成期間: ${months.value}か月\n熟成完了予定日: ${endDate}`;
      };
      productionDate.addEventListener("input", render);
      weight.addEventListener("input", render);
      start.addEventListener("input", render);
      months.addEventListener("change", render);
      document.getElementById("prosciuttoCopy").addEventListener("click", () => copyToClipboard(text.value, status));
      render();
    }

    function showEmulsion() {
      setHeader("乳化生地", "豚肉のみ / 豚肉＋豚脂", true, showHome);
      app.innerHTML = `
        <section class="section">
          <div class="field-row">
            <label>製造日
              <input id="emulsionProductionDate" type="date" value="${todayString()}">
            </label>
          </div>
          <div class="product-name">乳化生地</div>
          <div class="field-row">
            <label>方式
              <select id="emulsionMode">
                <option value="porkOnly">豚肉のみ</option>
                <option value="porkFat">豚肉＋豚脂</option>
              </select>
            </label>
            <label id="emulsionWeightLabel">肉重量(g)
              <input id="emulsionWeight" type="number" min="0" step="1" value="1000">
            </label>
            <button id="emulsionCopy" class="primary" type="button">計算結果をコピー</button>
          </div>
          <div id="emulsionResult"></div>
          <div class="copy-area">
            <textarea id="emulsionText" readonly></textarea>
            <div id="emulsionStatus" class="status"></div>
          </div>
        </section>
      `;
      const productionDate = document.getElementById("emulsionProductionDate");
      const mode = document.getElementById("emulsionMode");
      const weight = document.getElementById("emulsionWeight");
      const label = document.getElementById("emulsionWeightLabel");
      const result = document.getElementById("emulsionResult");
      const text = document.getElementById("emulsionText");
      const status = document.getElementById("emulsionStatus");
      const render = () => {
        const inputWeight = Math.max(Number(weight.value || 0), 0);
        label.childNodes[0].nodeValue = mode.value === "porkOnly" ? "肉重量(g)\n" : "豚肉＋豚脂重量(g)\n";
        const rows = mode.value === "porkOnly" ? calculateEmulsionPorkOnly(inputWeight) : calculateEmulsionPorkFat(inputWeight);
        const total = rows.reduce((sum, row) => sum + row.calculated, 0);
        result.innerHTML = tableHtml(rows, total);
        text.value = buildCopyText(`乳化生地 ${mode.value === "porkOnly" ? "豚肉のみ" : "豚肉＋豚脂"}`, rows, total, "g", productionDate.value);
      };
      productionDate.addEventListener("input", render);
      mode.addEventListener("change", render);
      weight.addEventListener("input", render);
      document.getElementById("emulsionCopy").addEventListener("click", () => copyToClipboard(text.value, status));
      render();
    }

    function calculateEmulsionPorkOnly(meat) {
      const porkFat = meat / 3;
      const ice = meat / 3;
      const base = meat + porkFat + ice;
      return [
        { name: "肉重量", group: "入力", calculated: meat },
        { name: "豚脂", group: "肉重量÷3", calculated: porkFat },
        { name: "氷", group: "肉重量÷3", calculated: ice },
        { name: "塩", group: "（肉重量＋豚脂＋氷）×1.6%", calculated: base * 0.016 },
        { name: "ヘラビンE", group: "（肉重量＋豚脂＋氷）×0.3%", calculated: base * 0.003 },
        { name: "ペルビナールHH", group: "（肉重量＋豚脂＋氷）×0.1%", calculated: base * 0.001 }
      ];
    }

    function calculateEmulsionPorkFat(weight) {
      const ice = weight * 0.25;
      const base = weight + ice;
      return [
        { name: "豚肉＋豚脂重量", group: "入力 / 完成比率80%", calculated: weight },
        { name: "氷", group: "（豚肉＋豚脂）×0.25 / 完成比率20%", calculated: ice },
        { name: "塩", group: "（豚肉＋豚脂＋氷）×1.6%", calculated: base * 0.016 },
        { name: "ヘラビンE", group: "（豚肉＋豚脂＋氷）×0.3%", calculated: base * 0.003 },
        { name: "ペルビナールHH", group: "（豚肉＋豚脂＋氷）×0.1%", calculated: base * 0.001 }
      ];
    }

    function showTemporaryStatus(statusElement, message, type = "notice") {
      if (!statusElement) return;
      statusElement.textContent = message;
      statusElement.classList.remove("notice", "error");
      statusElement.classList.add(type === "error" ? "error" : "notice");
      clearTimeout(statusElement.dataset.timerId);
      const timerId = setTimeout(() => {
        statusElement.textContent = "";
        statusElement.classList.remove("notice", "error");
        delete statusElement.dataset.timerId;
      }, 2500);
      statusElement.dataset.timerId = String(timerId);
    }

    async function copyToClipboard(text, statusElement) {
      if (!statusElement) return;
      try {
        await navigator.clipboard.writeText(text);
        statusElement.textContent = "コピーしました";
      } catch (error) {
        statusElement.textContent = "コピーできない場合は、下の文字を選択してコピーしてください";
      }
    }

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "hidden") persistCurrentScreenState();
    });
    window.addEventListener("beforeunload", persistCurrentScreenState);

    initApp();
  </script>
</body>
</html>
